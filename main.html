<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FRA Dashboard Demo</title>
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #0f172a; --panel: #111827; --muted: #94a3b8; --text: #e5e7eb;
  --accent: #22d3ee; --green: #22c55e; --yellow: #eab308; --red: #ef4444;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: linear-gradient(120deg,#0b1220,#0f172a 40%,#0b1220 100%);
  color: var(--text); font: 14px/1.45 system-ui, -apple-system, Segoe UI, Roboto;
  height: 100vh; display: grid; grid-template-rows: auto 1fr; overflow: hidden;
}
header {
  display: flex; justify-content: space-between; align-items: center; padding: 14px 18px;
  border-bottom: 1px solid #1f2937; backdrop-filter: blur(6px);
}
header h1 { margin:0; font-size:18px; letter-spacing:.3px; }
header .buttons { display:flex; gap:10px; }
button { cursor:pointer; background:#0a0f1c; color:var(--text); border:1px solid #1f2937;
  border-radius:10px; padding:6px 10px; transition:.15s ease; }
button:hover { transform: translateY(-1px); }
main { display:grid; grid-template-columns:1.2fr 1fr; gap:14px; padding:14px; height:calc(100vh - 56px); }
.card { background:#0b1220; border:1px solid #1f2937; border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.25); overflow:hidden; display:flex; flex-direction:column;
}
.card h2 { margin:0; padding:12px 14px; border-bottom:1px solid #1f2937; font-size:15px; color:#e2e8f0; }
#map { flex:1; min-height:360px; }
.grid { display:grid; grid-template-columns: repeat(3,1fr); gap:12px; padding:12px; }
.stat { background:#0a0f1c; border:1px solid #1f2937; border-radius:12px; padding:10px; text-align:center; }
.stat h3 { margin:0 0 6px 0; font-size:12px; color:#94a3b8; font-weight:600; }
.stat .val { font-size:20px; font-weight:700; }
canvas { background:#0b1220; border:1px solid #1f2937; border-radius:12px; padding:8px; margin-top:12px; }
@media (max-width:1100px) { main { grid-template-columns: 1fr; } .grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<header>
  <h1>FRA Dashboard Demo</h1>
  <div class="buttons">
    <button>Sign In</button>
    <button>Upload</button>
    <button>Search</button>
    <button>Change</button>
  </div>
</header>

<main>
  <!-- MAP PANEL -->
  <section class="card">
    <h2>Map Panel</h2>
    <div id="map"></div>
  </section>

  <!-- DASHBOARD PANEL -->
  <section class="card">
    <h2>Dashboard · Government Scheme Stats</h2>
    <div class="grid">
      <div class="stat"><h3>Total Claims</h3><div class="val" id="totalClaims">1200</div></div>
      <div class="stat"><h3>Total Approved</h3><div class="val" id="totalApproved">700</div></div>
      <div class="stat"><h3>Total Rejected</h3><div class="val" id="totalRejected">150</div></div>
      <div class="stat"><h3>Total In Process</h3><div class="val" id="totalInProcess">250</div></div>
      <div class="stat"><h3>Total Delay</h3><div class="val" id="totalDelay">100</div></div>
    </div>
    <canvas id="barChart"></canvas>
    <div style="text-align:center; margin-top:6px; font-size:13px; color:var(--muted);">Government Scheme</div>
  </section>
</main>

<script>
// ---------------------------
// Dummy Map
// ---------------------------
const map = L.map('map').setView([21.5,79],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18, attribution:'&copy; OpenStreetMap'}).addTo(map);

// ---------------------------
// Bar Chart
// ---------------------------
const ctx = document.getElementById('barChart');
const barChart = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['Claim', 'Approved', 'Rejected', 'In Process', 'Delay'],
    datasets: [{
      label: 'Number of Claims',
      data: [1200,700,150,250,100],
      backgroundColor: ['#22d3ee','#22c55e','#ef4444','#eab308','#6b7280']
    }]
  },
  options: {
    responsive:true,
    plugins: { legend:{ display:false } },
    scales: {
      x:{ ticks:{ color:'#cbd5e1' }, grid:{ color:'#1f2937' } },
      y:{ ticks:{ color:'#cbd5e1' }, grid:{ color:'#1f2937' } }
    }
  }
});
</script>

</body>
</html>
