<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FRA Dashboard Demo</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<header>
  <h1>FRA Dashboard Demo</h1>
  <div class="buttons">
    <button>Sign In</button>
    <button>Upload</button>
    <button id="search_button"><a href="search.html">Search</a></button>
    <button>Change</button>
  </div>
</header>

<main>
  <!-- MAP PANEL -->
  <section class="card">
    <h2>Map Panel</h2>
    <div id="map"></div>
  </section>

  <!-- DASHBOARD PANEL -->
  <section class="card">
    <h2>Dashboard · Government Scheme Stats</h2>
    <div class="grid">
      <div class="stat"><h3>Total Claims</h3><div class="val" id="totalClaims">1200</div></div>
      <div class="stat"><h3>Total Approved</h3><div class="val" id="totalApproved">700</div></div>
      <div class="stat"><h3>Total Rejected</h3><div class="val" id="totalRejected">150</div></div>
      <div class="stat"><h3>Total In Process</h3><div class="val" id="totalInProcess">250</div></div>
      <div class="stat"><h3>Total Delay</h3><div class="val" id="totalDelay">100</div></div>
    </div>
    <canvas id="barChart"></canvas>
    <div style="text-align:center; margin-top:6px; font-size:13px; color:var(--muted);">
      Government Scheme
    </div>
  </section>
</main>

<script>
// ---------------------------
// Dummy Map
// ---------------------------
const map = L.map('map').setView([21.5,79],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:18,
  attribution:'&copy; OpenStreetMap'
}).addTo(map);

// ---------------------------
// Bar Chart
// ---------------------------
const ctx = document.getElementById('barChart');
const barChart = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['Claim', 'Approved', 'Rejected', 'In Process', 'Delay'],
    datasets: [{
      label: 'Number of Claims',
      data: [1200,700,150,250,100],
      backgroundColor: ['#22d3ee','#22c55e','#ef4444','#eab308','#6b7280']
    }]
  },
  options: {
    responsive:true,
    plugins: { legend:{ display:false } },
    scales: {
      x:{ ticks:{ color:'#cbd5e1' }, grid:{ color:'#1f2937' } },
      y:{ ticks:{ color:'#cbd5e1' }, grid:{ color:'#1f2937' } }
    }
  }
});
</script>

</body>
</html>
